site_name: 嵌入式项目知识库
site_description: 嵌入式竞赛项目知识库
site_url: https://chenyilin077-ctrl.github.io/qianrs/
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 亮色模式

docs_dir: "E:/Obsidian Vault"

exclude_docs: |
  PCB源代码
  MDK-ARM
  TouchGFX
  Middlewares
  Drivers
  .obsidian
  .claude
  .claudian
  99_Templates
  *.pdf
  *.c
  *.h
  *.cpp
  *.o
  *.d
  *.crf
  *.ioc
  *.s
  *.ld
  *.lst
  *.bin
  *.hex
  *.axf
  *.dbgdt
  *.dbgconf

plugins:
  - search
  - roamlinks
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 外设笔记:
    - 外设索引: 2外设笔记/外设笔记索引.md
    - RCC时钟: 2外设笔记/RCC.md
    - GPIO: 2外设笔记/GPIO.md
    - UART: 2外设笔记/UART.md
    - SPI: 2外设笔记/SPI.md
    - I2C: 2外设笔记/I2C.md
    - TIM定时器: 2外设笔记/TIM.md
    - ADC: 2外设笔记/ADC.md
    - DMA: 2外设笔记/DMA.md
    - NVIC_EXTI: 2外设笔记/NVIC_EXTI.md
  - 芯片手册:
    - 芯片手册索引: 10_芯片手册/STM32芯片手册索引.md
  - 电路设计:
    - 原理图索引: 40_电路设计/电路原理图索引.md
  - 项目:
    - 智能导航仪:
      - 项目总览: 30_项目/智能导航仪/智能导航仪-项目总览.md
      - 硬件架构: 30_项目/智能导航仪/硬件架构文档.md
      - 通信链路: 30_项目/智能导航仪/模块通信链路.md
      - 踩坑日记: 30_项目/智能导航仪/踩坑日记.md
    - 李萨茹图形测量仪:
      - 项目总览: 30_项目/李萨茹图形/李萨茹图形测量仪-项目总览.md
      - 硬件架构: 30_项目/李萨茹图形/李萨茹-硬件架构与通信链路.md
      - 踩坑日记: 30_项目/李萨茹图形/李萨茹-踩坑日记.md
    - 二维云台视觉追踪:
      - 项目总览: 30_项目/二维云台视觉追踪/二维云台-项目总览.md
      - 硬件架构: 30_项目/二维云台视觉追踪/二维云台-硬件架构与通信链路.md
      - 踩坑日记: 30_项目/二维云台视觉追踪/二维云台-踩坑日记.md
    - 示波器:
      - 项目总览: 30_项目/示波器/示波器-项目总览.md
      - 硬件架构: 30_项目/示波器/示波器-硬件架构与通信链路.md
      - 踩坑日记: 30_项目/示波器/示波器-踩坑日记.md
    - 智能家居系统:
      - 项目总览: 30_项目/智能家居系统/智能家居-项目总览.md
      - 三层架构: 30_项目/智能家居系统/智能家居-三层架构与通信链路.md
